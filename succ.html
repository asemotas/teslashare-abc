<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Verified</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(180deg,#eef4ff,#dbeafe,#f8fafc);
    overflow:hidden;
}

/* Background Blur */
body::before{
    content:"";
    position:fixed;
    width:350px;
    height:350px;
    background:#4f8cff;
    border-radius:50%;
    filter:blur(130px);
    opacity:.35;
    top:-120px;
    left:-120px;
}

body::after{
    content:"";
    position:fixed;
    width:280px;
    height:280px;
    background:#34c759;
    border-radius:50%;
    filter:blur(120px);
    opacity:.25;
    bottom:-100px;
    right:-80px;
}

.card{
    position:relative;
    width:92%;
    max-width:420px;
    padding:40px 30px;
    text-align:center;

    background:rgba(255,255,255,.22);
    backdrop-filter:blur(30px);
    -webkit-backdrop-filter:blur(30px);

    border:1px solid rgba(255,255,255,.45);
    border-radius:34px;

    box-shadow:
        0 25px 60px rgba(0,0,0,.18),
        inset 0 1px rgba(255,255,255,.45);
}

.success{
    width:110px;
    height:110px;
    margin:0 auto 30px;
    border-radius:50%;
    background:linear-gradient(135deg,#34c759,#28a745);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:
        0 15px 35px rgba(52,199,89,.45);
    animation:pop .6s ease;
}

.success svg{
    width:58px;
    height:58px;
    stroke:#fff;
    stroke-width:4;
    fill:none;
    stroke-linecap:round;
    stroke-linejoin:round;
}

h1{
    font-size:31px;
    font-weight:700;
    color:#111827;
    margin-bottom:14px;
}

p{
    color:#4b5563;
    font-size:17px;
    line-height:1.6;
    margin-bottom:34px;
}

button{
    width:100%;
    padding:17px;
    border:none;
    border-radius:18px;
    cursor:pointer;

    background:linear-gradient(135deg,#007AFF,#4DA3FF);
    color:white;
    font-size:18px;
    font-weight:600;

    transition:.25s;
    box-shadow:0 12px 25px rgba(0,122,255,.35);
}

button:hover{
    transform:translateY(-2px);
}

button:active{
    transform:scale(.97);
}

@keyframes pop{
    0%{
        transform:scale(.2);
        opacity:0;
    }
    70%{
        transform:scale(1.1);
    }
    100%{
        transform:scale(1);
        opacity:1;
    }
}

@media(max-width:480px){

.card{
    padding:35px 25px;
}

h1{
    font-size:27px;
}

p{
    font-size:16px;
}

.success{
    width:95px;
    height:95px;
}

.success svg{
    width:50px;
    height:50px;
}

}
</style>
</head>

<body>

<div class="card">

    <div class="success">
        <svg viewBox="0 0 24 24">
            <path d="M20 6L9 17L4 12"/>
        </svg>
    </div>

    <h1>Payment Verified</h1>

    <p>
        Your payment has been successfully verified.
    </p>

    <button onclick="window.location.href='index.html'">
        Continue
    </button>

</div>

</body>
</html>
