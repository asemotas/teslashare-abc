<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - TeslaShare</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@10"></script>
  <script src="js/c03cee45d4.js" crossorigin="anonymous"></script>
  <link href="css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins&display=swap');
    * { font-size:12px; font-family:'Poppins', sans-serif; }
    body { margin:0; padding:0; background-color:#f8f9fa; }
    .container { max-width:400px; margin:0 auto; padding-top:80px; }
    .first { text-align:center; margin-bottom:40px; }
    .first img { border-radius:50%; margin-bottom:10px; border:3px solid #f95f5f36; }
    form {
      background-color:#fff;
      padding:24px;
      border-radius:10px;
      box-shadow:0px 0px 12px 0px rgba(0,0,0,0.1);
    }
    label { font-weight:bold; margin-bottom:6px; display:block; }
    input[type="text"], input[type="password"] {
      width:100%;
      padding:12px;
      outline:none;
      margin-bottom:18px;
      border:1px solid #f95f5f36;
      border-radius:10px;
      background:#fff;
    }
    input:focus { border-color:#B71C1C; box-shadow:0 0 0 3px #B71C1C22; }
    button[type="submit"] {
      width:100%;
      padding:12px;
      color:#fff;
      border:none;
      border-radius:10px;
      cursor:pointer;
      background:linear-gradient(to right, #B71C1C, #f95f5f36);
      font-weight:500;
    }
    .back-link { text-align:center; margin-top:20px; font-size:0.95rem; }
    .back-link a { color:#B71C1C; text-decoration:none; font-weight:500; }
    .back-link a:hover { text-decoration:underline; }
  </style>
  <script>
    function handleSignIn(e) {
      e.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!username || !password) {
        Swal.fire({
          title: 'Missing fields',
          text: 'Please enter both username and password.',
          icon: 'warning'
        });
        return;
      }

      localStorage.setItem("username", username);
      localStorage.setItem("registrationCompleted", "true");

      Swal.fire({
        title: 'Success!',
        text: 'You are now signed in.',
        icon: 'success',
        timer: 1200,
        showConfirmButton: false
      }).then(() => {
        window.location.href = 'board.html';
      });
    }

    window.onload = function() {
      if (localStorage.getItem("registrationCompleted")) {
        window.location.href = 'board.html';
      }
    }
  </script>
</head>
<body>

  <div class="container">
    <div class="first">
      <img width="60" height="60" src="images/tesla.svg" alt="">
      <h3>TeslaShare</h3>
    </div>

    <form onsubmit="handleSignIn(event)">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Your username" required="">

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Your password" required="">

      <button type="submit">Sign In</button>
    </form>

    <div class="back-link">
      Don't have an account? <a href="/">Sign up here</a>
    </div>
  </div>

  <script src="js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

</body></html>
